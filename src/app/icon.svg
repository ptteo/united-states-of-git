<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030814"/>
      <stop offset="100%" stop-color="#0a1a42"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigNeon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="12" y="12" width="488" height="488" rx="98" fill="none" stroke="#00f0ff" stroke-width="6" opacity="0.3"/>
  <!-- Globe circle -->
  <circle cx="256" cy="210" r="105" fill="none" stroke="url(#glow)" stroke-width="8" filter="url(#neon)" opacity="0.9"/>
  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="210" rx="105" ry="40" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.35"/>
  <ellipse cx="256" cy="210" rx="105" ry="78" fill="none" stroke="#00f0ff" stroke-width="2.5" opacity="0.25"/>
  <!-- Globe meridian -->
  <ellipse cx="256" cy="210" rx="40" ry="105" fill="none" stroke="#00f0ff" stroke-width="3" opacity="0.35"/>
  <!-- Tower bars rising from globe -->
  <rect x="193" y="130" width="18" height="80" rx="4" fill="#39ff14" opacity="0.9" filter="url(#neon)"/>
  <rect x="245" y="95" width="22" height="115" rx="4" fill="#00f0ff" opacity="0.9" filter="url(#neon)"/>
  <rect x="299" y="115" width="18" height="95" rx="4" fill="#ff00e5" opacity="0.85" filter="url(#neon)"/>
  <!-- USG text -->
  <text x="256" y="415" text-anchor="middle" font-family="monospace, sans-serif" font-weight="900" font-size="115" fill="url(#glow)" filter="url(#bigNeon)" letter-spacing="18">USG</text>
  <!-- Subtle underline -->
  <line x1="110" y1="445" x2="402" y2="445" stroke="#00f0ff" stroke-width="4" opacity="0.3"/>
</svg>
