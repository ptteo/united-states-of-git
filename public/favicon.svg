<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030814"/>
      <stop offset="100%" stop-color="#0a1a42"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0080ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Border glow -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="12.5" fill="none" stroke="#00f0ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Globe circle -->
  <circle cx="32" cy="26" r="13" fill="none" stroke="url(#glow)" stroke-width="1.8" filter="url(#neon)" opacity="0.9"/>
  <!-- Globe latitude lines -->
  <ellipse cx="32" cy="26" rx="13" ry="5" fill="none" stroke="#00f0ff" stroke-width="0.7" opacity="0.4"/>
  <ellipse cx="32" cy="26" rx="13" ry="10" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Globe meridian -->
  <ellipse cx="32" cy="26" rx="5" ry="13" fill="none" stroke="#00f0ff" stroke-width="0.7" opacity="0.4"/>
  <!-- Tower bars rising from globe -->
  <rect x="24" y="16" width="2.5" height="10" rx="0.5" fill="#39ff14" opacity="0.9" filter="url(#neon)"/>
  <rect x="30.5" y="11" width="3" height="15" rx="0.5" fill="#00f0ff" opacity="0.9" filter="url(#neon)"/>
  <rect x="37" y="14" width="2.5" height="12" rx="0.5" fill="#ff00e5" opacity="0.8" filter="url(#neon)"/>
  <!-- USG text -->
  <text x="32" y="52" text-anchor="middle" font-family="monospace, sans-serif" font-weight="900" font-size="14" fill="url(#glow)" filter="url(#neon)" letter-spacing="2">USG</text>
  <!-- Subtle underline -->
  <line x1="14" y1="56" x2="50" y2="56" stroke="#00f0ff" stroke-width="0.8" opacity="0.35"/>
</svg>
